services:
  postgres:
    image: postgres:15
    container_name: krishi-mitra-postgres
    restart: unless-stopped
    network_mode: "host"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: krishi_mitra
      PGPORT: 5433
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
